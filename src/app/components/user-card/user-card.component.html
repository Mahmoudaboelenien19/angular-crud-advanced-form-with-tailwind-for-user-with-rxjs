<mat-card class="user-card">
  <mat-card-header>
    <mat-card-title>{{ user.name }}</mat-card-title>
    <mat-card-subtitle>{{ user.email }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p><strong>Age:</strong> {{ user.age }}</p>

    <div *ngIf="user.skills?.length">
      <strong>Skills:</strong>
      <mat-chip-set>
        <mat-chip *ngFor="let skill of user.skills">{{ skill }}</mat-chip>
      </mat-chip-set>
    </div>

    <div *ngIf="user.experience?.length">
      <strong>Experience:</strong>
      <ul>
        <li *ngFor="let exp of user.experience">
          {{ exp.title }} – {{ exp.years }} year{{ exp.years !== 1 ? "s" : "" }}
        </li>
      </ul>
    </div>
  </mat-card-content>

  <mat-card-actions align="end">
    <button
      mat-icon-button
      color="primary"
      (click)="onEdit()"
      aria-label="Edit user"
    >
      <mat-icon>edit</mat-icon>
    </button>
    <button
      mat-icon-button
      color="warn"
      (click)="onDelete()"
      aria-label="Delete user"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
